        <section class="conteudo-pagina">

                <h2>Vincular Nova Bolsa</h2>
                <p>Crie sua conta para ativar o rastreamento em tempo real e a trava biométrica.</p>
            

            <div class="pre-cadastro">
                <form>
                    <div class="dadoscadastro">
                       <label class="dadosletras">NOME COMPLETO</label>
                       <input class="centralizar" type="text" id="nome-user" placeholder="Ex: João Silva">
                       
                       <label class="dadosletras">E-MAIL</label>
                       <input class="centralizar" type="email" id="email-user" placeholder="seu@email.com">
                       
                       <label class="dadosletras">ID DO SENSOR (ETIQUETA)</label>
                       <input class="centralizar" type="text" id="id-sensor" placeholder="Ex: SB-IOT-9921">

                       <label class="dadosletras">SENHA DE ACESSO</label>
                       <input class="centralizar" type="password" id="senha-user" placeholder="••••••••">
                        </div>
                </form>

                <button class="btn-acao" onclick="realizarCadastro()">Ativar Sistema IoT</button>
                
                <p>Ao clicar, você aceita os termos de segurança e criptografia de dados.</p>
